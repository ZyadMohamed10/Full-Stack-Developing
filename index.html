<!DOCTYPE html>
<html lang="en">
<head>
    <title>Doctor Appointment</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <div class="left">
    
        <img src="doctor2-.jpg" alt="Doctor">
        
    </div>

    <div class="right">

        <h1>Doctor Appointment Form</h1>
        <hr>
        <div class="Data">
        <div class="row">
            <label>Appointment Date:</label>
            <input type="date">
        </div>

        <div class="row">
            <label>Appointment Time:</label>
            <input type="time">
        </div>

        <div class="row">
            <label>Name:</label>
            <input type="text" placeholder="First">
            <input type="text" placeholder="Last">
        </div>

        <div class="row">
            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <div class="row">
            <label>Phone:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Address:</label>
            <input type="text" placeholder="Country">
            <input type="text" placeholder="State">
        </div>
        <div class="row">
            <label>Your Query:</label>
            <textarea id="query" rows="5" cols="40"></textarea>
        </div>
        
        <div class="row">

            <label>Appointment Type:</label>

        <div class="checkbox">
            <p>Select Which Appointment Type(s) You Requires:</p>

            <input type="checkbox"> Cervix Checkup <br>
            <input type="checkbox"> Heart Checkup <br>
            <input type="checkbox"> Eye Checkup <br>
            <input type="checkbox"> Hearing Test
        </div>

        </div>
            <button type="submit">Send</button>            
        </div>
        
    </div>
    </body>
</html>
